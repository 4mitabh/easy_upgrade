name: easy_upgrade
description: Drop-in upgrade prompter for Flutter — zero configuration. Automatically handles in-app updates via the iOS App Store and Android Play Core.
version: 0.1.2
homepage: https://github.com/4mitabh/easy_upgrade
repository: https://github.com/4mitabh/easy_upgrade

environment:
  sdk: ^3.12.0
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.mysthetic.easyupgrade
        pluginClass: EasyUpgradePlugin
